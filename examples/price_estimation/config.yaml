project_name: price-estimation
artifacts_dir: ./artifacts

data:
  source: jsonl
  train_path: ./data/train.jsonl
  val_path: ./data/validation.jsonl
  test_path: ./data/test.jsonl
  max_train: 100
  max_val: 50
  max_test: 200

model:
  base_model: gpt-4.1-nano-2025-04-14
  suffix: pricer
  seed: 42

hyperparameters:
  n_epochs: 1
  batch_size: 1

trainer:
  poll_interval_seconds: 30
  wait_for_completion: true

inference:
  max_tokens: 7
  temperature: 0.0
  max_retries: 3
